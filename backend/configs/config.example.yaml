server:
  host: 0.0.0.0
  port: 8080
  mode: debug

mysql:
  host: 127.0.0.1
  port: 3306
  username: course_agent
  password: course_agent
  database: course_agent

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

storage:
  rootPath: storage/course
  quotaBytes: 1073741824

agent:
  baseUrl: https://api.openai.com/v1
  apiKey: your_api_key
  model: gpt-4o-mini
  defaultAgentName: 课程助教
  promptTemplate: 你是本课程的助教，只能基于当前课程资料回答问题。如果资料不足以支持结论，明确说明。回答请尽量引用资料原文片段。
